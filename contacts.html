<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <header>
        <nav>
            <div class="logo">PORTFOLIO.</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>

                <li><a href="contacts.html" class="active">Contacts</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-section">
        <h2 class="burgundy-text">Get In Touch</h2>
        <div class="contact-flex">
            <form class="contact-form" id="contactForm">
                <label>Name</label>
                <input type="text" id="userName" placeholder="Your Name" required>
                <label>Email</label>
                <input type="email" id="userEmail" placeholder="Your Email" required>
                <label>Message</label>
                <textarea id="userMsg" rows="4" placeholder="How can I help you?" required></textarea>
                <button type="submit" class="send-btn">Send Email</button>
            </form>

            <div class="contact-info">
                <h4>Contact Details</h4>
                <p><i class="fa fa-envelope"></i> orengarcia7@gmail.com</p>
                <p><i class="fa fa-phone"></i> +63 909 377 1006</p>
                <div class="social-icons">
                    <a href="https://facebook.com/oren.garcia.sy" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                    <a href="https://instagram.com/renquinonez" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://github.com/orengarcia" target="_blank"><i class="fa-brands fa-github"></i></a>
                </div>
            </div>
        </div>
    </main>

    <footer>
    </footer>

</body>
